name: serviko_admin
description: "A minimal admin dashboard for managing providers, categories,
  bookings and approvals in the Serviko platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies
dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_reorderable_grid_view: ^5.6.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  lottie: ^3.3.3

# Dev Dependencies
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Assets
  assets:
    - assets/images/
    - assets/animations/
